<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../Styles/index.css">
</head>
<body>
    <div class="container">
        <div class="hero">
            <p>
                Educação não é um aprendizado de fatos, mas treinamento para pensar. <br>
                Albert Einstein
            </p>
        </div>
        <div class="formulario">
            <div>   
                <h1>Cadastre-se</h1>
                <p>Passo 2 de 2 <br>
                Por favor, insira seus dados para finalizar.</p>
                <div>
                    <form action="index.html">
                        <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Nome completo">
                        <label for="telefone">Telefone</label>
                        <input type="text" name="telefone" id="telefone" placeholder="(48) 99999-9999">
                        <label for="email">E-mail</label>
                        <input type="text" name="email" id="email" placeholder="user@gmail.com">
                        <label for="senha">Senha</label>
                        <input type="password" name="senha" id="senha" placeholder="*********">
                        <button type="submit">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueceu sua senha</title>

    <link rel="stylesheet" href="../Styles/style.css">
    <link rel="stylesheet" href="../Styles/mobile.css">
</head>
<body>
    <div class="container">
        <div class="hero">
            <p>
                "Educação não é um aprendizado de fatos, mas treinamento para pensar." <br>
                <span>Albert Einstein</span>
            </p>
        </div>
        <div class="formulario">
            <div>   
                <h1>Esqueci minha senha</h1>
                <p>informe seu e-mail para enviarmos um link para redefinirsua senha.</p>
                <div>
                    <form action="novaSenha.html">
                        <label for="email">E-mail</label>
                        <input type="text" name="email" id="email" placeholder="user@gmail.com">
                        <button type="submit">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
